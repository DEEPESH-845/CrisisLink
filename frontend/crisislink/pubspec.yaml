name: crisislink
description: CrisisLink Emergency AI Co-Pilot — Flutter unified app for operators, responders, and admins.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5
  firebase_auth: ^5.5.5

  # Maps
  google_maps_flutter: ^2.12.1

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fast_check: ^0.1.0

flutter:
  uses-material-design: true
